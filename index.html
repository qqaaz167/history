<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中國歷史人物</title>
<style>
  :root {
    --bg: #f5f0e8;
    --card-bg: #fefcf7;
    --border: #d4c5a9;
    --text: #3a2e1e;
    --text-muted: #7a6a55;
    --accent: #8b4513;
    --header-bg: #3a2e1e;
    --header-text: #f5f0e8;
    --btn-active: #8b4513;
    --shadow: rgba(58,46,30,0.15);
    --atrb:#034176;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: "PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif; }

  /* Header */
  .header { background: var(--header-bg); color: var(--header-text); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px var(--shadow); }
  .header h1 { font-size: 1.3rem; letter-spacing: 0.1em; margin-bottom: 12px; text-align: center; }

  .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .search-row input {
    flex: 1; padding: 7px 12px; border-radius: 6px; border: none;
    background: rgba(255,255,255,0.15); color: var(--header-text);
    font-size: 0.95rem; outline: none;
  }
  .search-row input::placeholder { color: rgba(245,240,232,0.6); }
  .search-row input:focus { background: rgba(255,255,255,0.25); }

  .sort-select {
    padding: 7px 10px; border-radius: 6px; border: none;
    background: rgba(255,255,255,0.15); color: var(--header-text);
    font-size: 0.85rem; cursor: pointer; outline: none;
  }

  .filter-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .filter-row + .filter-row { margin-top: 6px; }

  .btn {
    padding: 4px 11px; border-radius: 20px; border: 1px solid rgba(245,240,232,0.4);
    background: transparent; color: var(--header-text); font-size: 0.8rem;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.2); }
  .btn.active { background: var(--btn-active); border-color: var(--btn-active); color: #fff; }
  .btn-all { border-color: rgba(245,240,232,0.6); }

  /* Result count */
  .result-bar {
    padding: 8px 20px; font-size: 0.85rem; color: var(--text-muted);
    border-bottom: 1px solid var(--border); background: var(--bg);
  }

  /* Cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px; padding: 16px 20px;
  }

  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; cursor: pointer;
    box-shadow: 0 2px 6px var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 5px 14px var(--shadow); }

  .card-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }

  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 0.72rem; font-weight: bold; color: #fff;
  }
  .tag-先秦 { background: #3a5a40; }
  .tag-秦漢 { background: #8b1a1a; }
  .tag-三國 { background: #a0522d; }
  .tag-隋   { background: #6b3a7d; }
  .tag-唐   { background: #b8860b; }
  .tag-宋   { background: #2a6b8a; }
  .tag-元   { background: #2a3a6b; }
  .tag-明   { background: #c0392b; }
  .tag-清   { background: #2c6e6e; }
  .tag-戰國 { background: #5a7a20; }
  .tag-cat  { background: rgba(100,80,60,0.2); color: var(--text-muted); font-weight: normal; }

  .year { margin-left: auto; font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
  .stars { font-size: 0.8rem; color: #c8962a; letter-spacing: -1px; }

  .card-name { font-size: 1.15rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
  .card-atrib { font-size: 1rem; font-weight: bold; color: var(--atrb); margin-bottom: 0px; }
  .card-desc {
    font-size: 0.85rem; line-height: 1.7; color: var(--text-muted);
    overflow: hidden;
  }
  .card-desc.collapsed {
    display: -webkit-box; -webkit-box-orient: vertical;
  }

  .expand-btn {
    font-size: 0.75rem; color: var(--accent); cursor: pointer;
    margin-top: 6px; display: inline-block;
    background: none; border: none; padding: 4px 0;
    min-height: 32px; line-height: 32px;
  }
  .expand-btn:hover { text-decoration: underline; }

  .no-result {
    text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 1rem;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; padding: 12px; }
    .header { padding: 12px; }
  }

  /* ── 測驗模式 ── */
  #quiz-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 200; overflow-y: auto;
    flex-direction: column;
  }
  #quiz-overlay.active { display: flex; }
  .quiz-header {
    background: var(--header-bg); color: var(--header-text);
    padding: 14px 20px; display: flex; justify-content: space-between;
    align-items: center; position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .q-progress { font-size: 0.9rem; opacity: 0.85; }
  .q-score { font-size: 1rem; font-weight: bold; color: #f5c842; }
  .quiz-body { flex: 1; padding: 24px 20px; max-width: 560px; margin: 0 auto; width: 100%; }
  .quiz-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }
  .quiz-question {
    font-size: 1.35rem; font-weight: bold; color: var(--accent);
    line-height: 1.5; margin-bottom: 24px; min-height: 56px;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px;
  }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .quiz-opt {
    padding: 18px 8px; font-size: 1.05rem; font-weight: bold;
    border-radius: 10px; border: 2px solid var(--border);
    background: var(--card-bg); color: var(--text);
    cursor: pointer; transition: all 0.15s; min-height: 60px; line-height: 1.3;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--accent); background: #fdf5e8; }
  .quiz-opt.correct { background: #d4edda; border-color: #28a745; color: #155724; }
  .quiz-opt.wrong   { background: #f8d7da; border-color: #dc3545; color: #721c24; }
  .quiz-opt:disabled { cursor: default; opacity: 0.85; }
  .quiz-explain {
    display: none; background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; font-size: 0.85rem;
    color: var(--text-muted); line-height: 1.7; margin-bottom: 16px;
  }
  .quiz-explain.show { display: block; }
  .quiz-next-btn {
    width: 100%; padding: 14px; font-size: 1rem; font-weight: bold;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    cursor: pointer; display: none; margin-bottom: 12px;
  }
  .quiz-next-btn.show { display: block; }
  .quiz-next-btn:hover { opacity: 0.9; }
  .quiz-end-btn {
    width: 100%; padding: 10px; font-size: 0.85rem;
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  }
  .quiz-result {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; padding: 40px 24px; text-align: center;
  }
  .quiz-result.show { display: flex; }
  .result-score { font-size: 3rem; font-weight: bold; color: var(--accent); margin-bottom: 8px; }
  .result-label { font-size: 1rem; color: var(--text-muted); margin-bottom: 6px; }
  .result-grade { font-size: 1.4rem; font-weight: bold; margin: 16px 0 28px; color: var(--text); }
  .quiz-result-btns { display: flex; gap: 12px; width: 100%; max-width: 320px; }
  .quiz-result-btns button {
    flex: 1; padding: 14px; border-radius: 10px; font-size: 1rem;
    font-weight: bold; cursor: pointer; border: 2px solid var(--accent);
  }
  .btn-retry { background: var(--accent); color: #fff; }
  .btn-back  { background: transparent; color: var(--accent); }
  .quiz-start-btn {
    padding: 5px 14px; border-radius: 20px; border: 2px solid rgba(245,240,232,0.4);
    background: rgba(139,69,19,0.5); color: var(--header-text);
    font-size: 1.3rem; cursor: pointer; white-space: nowrap; margin-top: 6px;
  }
  .quiz-start-btn:hover { background: var(--btn-active); }
</style>
</head>
<body>

<div class="header">
  <h1>中國歷史人物</h1>
  <div class="search-row">
    <input type="text" id="search" placeholder="搜尋姓名或關鍵字…" oninput="render()">
    <select class="sort-select" id="sort" onchange="render()">
      <option value="dynasty">依朝代</option>
      <option value="influence">依影響力</option>
    </select>
  </div>
  <div class="filter-row" id="dynasty-btns"></div>
  <div class="filter-row" id="cat-btns"></div>
  <div class="filter-row">
    <button class="quiz-start-btn" onclick="startQuiz()">&#x2B50;&#x2B50;&#x2B50; 歷史人物大會考 &#x2B50;&#x2B50;&#x2B50;</button>
  </div>
</div>

<div class="result-bar" id="result-bar"></div>
<div class="grid" id="grid"></div>

<div id="quiz-overlay">
  <div id="quiz-main">
    <div class="quiz-header">
      <span class="q-progress" id="q-progress">第 1 / 10 題</span>
      <span class="q-score" id="q-score">答對 0 題</span>
    </div>
    <div class="quiz-body">
      <div class="quiz-label">以下哪位人物的貢獻是：</div>
      <div class="quiz-question" id="q-question"></div>
      <div class="quiz-options" id="q-options"></div>
      <div class="quiz-explain" id="q-explain"></div>
      <button class="quiz-next-btn" id="q-next" onclick="nextQuestion()">下一題 →</button>
      <button class="quiz-end-btn" onclick="endQuiz()">結束測驗</button>
    </div>
  </div>
  <div class="quiz-result" id="quiz-result">
    <div class="result-score" id="r-score"></div>
    <div class="result-label">答對題數</div>
    <div class="result-grade" id="r-grade"></div>
    <div class="quiz-result-btns">
      <button class="btn-retry" onclick="startQuiz()">再試一次</button>
      <button class="btn-back" onclick="closeQuiz()">回到目錄</button>
    </div>
  </div>
</div>

<script>
const RAW = [{"序號":1,"姓名":"孔子","影響力":5,"生卒年":"前551-前479","朝代":"先秦","分類":"思想","貢獻":"《論語》","簡述":"春秋時期偉大思想家與教育家，儒家學派創始人，提倡仁義禮智信，主張以德治國，重視教育與道德修養，弟子逾三千人，其思想成為中國文化與政治倫理的核心，影響東亞文明兩千餘年。"},{"序號":2,"姓名":"孟子","影響力":5,"生卒年":"前470-前391","朝代":"先秦","分類":"思想","貢獻":"《孟子》","簡述":"戰國時期儒家重要代表人物，主張性善論與仁政思想，強調民為貴、社稷次之、君為輕，提倡王道政治，反對霸道，其思想對後世儒學與民本政治理念產生深遠影響，被尊稱為亞聖。"},{"序號":3,"姓名":"荀子","影響力":4,"生卒年":"前313-前238","朝代":"先秦","分類":"思想","貢獻":"《荀子》","簡述":"戰國末期著名儒家學者，提出性惡論，認為人性需靠禮法與教育加以規範，強調制度建設與社會秩序的重要性，融合儒法思想，弟子包括韓非與李斯，對秦漢政治思想影響深遠。"},{"序號":4,"姓名":"老子","影響力":5,"生卒年":"約前6世紀","朝代":"先秦","分類":"思想","貢獻":"《道德經》","簡述":"道家學派創始人，著有《道德經》五千言，主張無為而治與順應自然之道，反對過度干預人事，強調柔弱勝剛強，其哲學對中國哲學、政治思想及文化藝術產生深遠且持久的影響。"},{"序號":5,"姓名":"莊子","影響力":4,"生卒年":"前369-前286","朝代":"先秦","分類":"思想","貢獻":"《莊子》","簡述":"戰國時期道家思想家，提出齊物論與逍遙遊思想，強調精神自由與超脫世俗束縛，以寓言散文著稱，文風奇崛瑰麗，其哲學對後世文學、藝術與佛道思想影響極為深遠。"},{"序號":6,"姓名":"墨子","影響力":4,"生卒年":"前468-前376","朝代":"先秦","分類":"思想","貢獻":"《墨子》","簡述":"墨家學派創始人，主張兼愛非攻、節用尚賢，提倡社會平等與反對不義戰爭，重視邏輯推理與科技實踐，在光學力學等領域有早期貢獻，與儒家並稱顯學，對戰國思想格局影響重大。"},{"序號":7,"姓名":"韓非","影響力":4,"生卒年":"前280-前233","朝代":"先秦","分類":"思想","貢獻":"《韓非子》","簡述":"法家思想集大成者，荀子弟子，強調以法治國與鞏固君主權威，提出法、術、勢三結合理論，論述帝王駕馭臣下之術，其學說被秦始皇所採用，對中國政治制度與法治思想影響深遠。"},{"序號":8,"姓名":"孫武","影響力":5,"生卒年":"前545-前470","朝代":"先秦","分類":"軍事","貢獻":"《孫子兵法》","簡述":"春秋時期著名軍事家與兵法家，著有《孫子兵法》十三篇，提出知彼知己百戰不殆、攻心為上等卓越戰略思想，被歷代兵家奉為圭臬，被視為世界軍事理論史上的不朽經典。"},{"序號":9,"姓名":"吳起","影響力":3,"生卒年":"前440-前381","朝代":"先秦","分類":"軍事","貢獻":"《吳起兵法》","簡述":"戰國時期著名將領兼改革家，曾在魯、魏、楚三國任職，主張強兵與法治並行，推行軍政改革，戰功顯赫，著有《吳起兵法》，其改革思想對後世軍事與政治制度均有深刻影響。"},{"序號":10,"姓名":"白起","影響力":4,"生卒年":"前332-前257","朝代":"先秦","分類":"軍事","貢獻":"長平之戰","簡述":"戰國時期秦國著名將領，號稱殺神，善於指揮大規模殲滅戰，長平之戰中坑殺趙軍四十萬，累計斬敵逾百萬，戰功冠絕當世，被後世評為戰國四大名將之首，最終含冤賜死。"},{"序號":11,"姓名":"廉頗","影響力":3,"生卒年":"前327-前243","朝代":"先秦","分類":"軍事","貢獻":"合縱防秦","簡述":"戰國時期趙國著名將領，與藺相如共演將相和美談，善於防禦作戰與戰略布局，長期鎮守邊疆抵抗秦軍，是趙國重要軍事支柱，晚年流落他國，仍壯心不已，為後世敬仰。"},{"序號":12,"姓名":"李牧","影響力":3,"生卒年":"？-前229","朝代":"先秦","分類":"軍事","貢獻":"北疆防匈奴","簡述":"戰國末期趙國名將，長期鎮守北方邊境，以靈活戰術多次大敗匈奴，並成功抵禦秦軍進攻，是趙國最後的軍事屏障，後被奸臣讒害冤殺，趙國隨即滅亡，被視為戰國四大名將之一。"},{"序號":13,"姓名":"屈原","影響力":5,"生卒年":"前340-前278","朝代":"先秦","分類":"文學","貢獻":"《離騷》《九歌》《天問》","簡述":"戰國時期楚國愛國詩人與政治家，楚辭體的開創者，代表作《離騷》充滿對國家的深切憂思與浪漫主義色彩，因遭讒言流放，最終投汨羅江殉國，成為中國文化史上永恆的悲劇英雄。"},{"序號":14,"姓名":"秦始皇","影響力":5,"生卒年":"前259-前210","朝代":"秦漢","分類":"政治","貢獻":"郡縣制、書同文、車同軌","簡述":"秦朝開國皇帝，完成統一六國的歷史偉業，建立中國第一個中央集權帝制國家，推行郡縣制、書同文、車同軌、統一度量衡，修建萬里長城，奠定中國大一統的政治格局，影響後世兩千餘年。"},{"序號":15,"姓名":"漢武帝","影響力":5,"生卒年":"前156-前87","朝代":"秦漢","分類":"政治","貢獻":"罷黜百家獨尊儒術、推恩令","簡述":"西漢第七位皇帝，在位五十四年，推行罷黜百家獨尊儒術確立儒學正統地位，頒布推恩令削弱諸侯，任用衛青、霍去病大破匈奴，開闢絲綢之路，使漢朝國力達到鼎盛高峰。"},{"序號":16,"姓名":"漢文帝","影響力":4,"生卒年":"前203-前157","朝代":"秦漢","分類":"政治","貢獻":"輕徭薄賦、減刑","簡述":"西漢第五位皇帝，以仁政著稱，施行與民休息政策，大幅減輕賦稅徭役，廢除肉刑，提倡節儉，促進社會經濟迅速恢復，與子漢景帝共同開創文景之治，為漢武帝盛世奠定基礎。"},{"序號":17,"姓名":"王莽","影響力":3,"生卒年":"前45-23","朝代":"秦漢","分類":"政治","貢獻":"王田制、貨幣改革","簡述":"西漢外戚，以禪讓方式篡漢建立新朝，推行王田制、五均六筦等大規模改革，試圖恢復上古井田制度，然政策激進脫離現實，導致社會動盪，引發農民起義，新朝僅歷十五年即亡。"},{"序號":18,"姓名":"光武帝劉秀","影響力":4,"生卒年":"前5-57","朝代":"秦漢","分類":"政治","貢獻":"中興漢室","簡述":"東漢王朝開國皇帝，以柔道治國，重整朝綱，整頓吏治，減輕農民負擔，推行度田政策抑制豪強，廣設學校弘揚儒術，使飽受戰亂破壞的社會逐步恢復秩序與繁榮，史稱光武中興。"},{"序號":19,"姓名":"項羽","影響力":4,"生卒年":"前232-前202","朝代":"秦漢","分類":"軍事","貢獻":"鉅鹿之戰","簡述":"楚漢相爭時期西楚霸王，驍勇善戰，鉅鹿之戰以少勝多大破秦軍，是推翻秦朝的關鍵人物，然性格剛愎、缺乏政治謀略，最終在垓下之戰敗於劉邦，烏江自刎，留下千古悲劇英雄形象。"},{"序號":20,"姓名":"韓信","影響力":4,"生卒年":"約前231-前196","朝代":"秦漢","分類":"軍事","貢獻":"背水一戰、明修棧道暗度陳倉","簡述":"漢初傑出軍事統帥，從市井之徒起家，善於出奇制勝，背水一戰等戰役展現卓越軍事天才，協助劉邦平定天下，被封齊王，後以謀反罪被呂后誅殺，後世稱為兵仙神帥。"},{"序號":21,"姓名":"司馬遷","影響力":5,"生卒年":"145-86","朝代":"秦漢","分類":"綜合","貢獻":"《史記》","簡述":"西漢著名史學家與文學家，忍受宮刑之辱，歷時十餘年撰成《史記》一百三十篇，開創紀傳體史書體例，全面記錄黃帝至漢武帝三千年歷史，被後世譽為史家之絕唱、無韻之離騷。"},{"序號":22,"姓名":"曹操","影響力":5,"生卒年":"155-220","朝代":"三國","分類":"政治","貢獻":"屯田制","簡述":"東漢末年傑出政治家、軍事家與文學家，挾天子以令諸侯，掃平群雄統一北方，推行屯田制穩定農業生產，其文學作品氣魄雄渾，建安文學代表人物，奠定曹魏政權基礎，死後被追尊為魏武帝。"},{"序號":23,"姓名":"劉備","影響力":4,"生卒年":"161-223","朝代":"三國","分類":"政治","貢獻":"蜀漢建立","簡述":"三國時期蜀漢政權開國皇帝，自稱漢室宗親，以仁德寬厚著稱，三顧茅廬請出諸葛亮，聯吳抗曹取得益州，建立蜀漢政權，與關羽張飛結義的忠義故事廣為流傳千古。"},{"序號":24,"姓名":"孫權","影響力":3,"生卒年":"182-252","朝代":"三國","分類":"政治","貢獻":"三國鼎立局面形成","簡述":"三國時期東吳開國皇帝，繼承父兄基業，善於識人用人，任用周瑜、陸遜等名將，聯劉抗曹取得赤壁大捷，後奪荊州，鞏固江東基業，與魏蜀形成三國鼎立格局，在位期間江東安定繁榮。"},{"序號":25,"姓名":"諸葛亮","影響力":5,"生卒年":"181-234","朝代":"三國","分類":"軍事","貢獻":"隆中對、北伐","簡述":"三國時期蜀漢丞相，字孔明被稱為臥龍，精通軍事、政治與外交，隆中對奠定三分天下戰略，協助劉備建立蜀漢，後六出祁山北伐曹魏，鞠躬盡瘁死而後已，成為忠誠智慧的歷史典範。"},{"序號":26,"姓名":"隋文帝","影響力":4,"生卒年":"541-604","朝代":"隋","分類":"政治","貢獻":"均田制、創立科舉","簡述":"隋朝開國皇帝楊堅，終結南北朝近三百年分裂局面，統一全國，推行均田制與科舉制度，改革三省六部行政體系，加強中央集權，史稱開皇之治，為隋唐盛世奠定重要基礎。"},{"序號":27,"姓名":"隋煬帝","影響力":3,"生卒年":"569-618","朝代":"隋","分類":"政治","貢獻":"開鑿大運河","簡述":"隋朝第二位皇帝，在位期間開鑿貫通南北的大運河、興建東都洛陽、三征高句麗，功在千秋亦罪在當代，因徭役繁重、連年征戰耗盡民力，激起各地民變，導致隋朝二世而亡。"},{"序號":28,"姓名":"唐太宗","影響力":5,"生卒年":"599-649","朝代":"唐","分類":"政治","貢獻":"貞觀之治","簡述":"唐朝第二位皇帝李世民，發動玄武門之變奪取帝位，即位後廣納諫言、重用賢才，任用魏徵房玄齡等名臣，推行均田制與科舉，開創政治清明百姓安居的貞觀之治，被奉為明君典範。"},{"序號":29,"姓名":"武則天","影響力":5,"生卒年":"624-705","朝代":"唐","分類":"政治","貢獻":"擴大科舉","簡述":"中國歷史上唯一正式稱帝的女性皇帝，先後為唐太宗才人、唐高宗皇后，後自立為帝改國號為周，在位期間重用賢才、打擊門閥貴族、完善科舉制度，促進社會生產與文化發展，政績卓著。"},{"序號":30,"姓名":"李白","影響力":5,"生卒年":"701-762","朝代":"唐","分類":"文學","貢獻":"《將進酒》《蜀道難》","簡述":"唐代偉大浪漫主義詩人，被後世尊稱為詩仙，風格豪放飄逸不羈，代表作《將進酒》《蜀道難》充滿奔放想像與強烈個性，一生遊歷山川詩酒縱橫，對後世中國詩歌與文化影響無比深遠。"},{"序號":31,"姓名":"杜甫","影響力":5,"生卒年":"712-770","朝代":"唐","分類":"文學","貢獻":"《三吏》《三別》","簡述":"唐代偉大現實主義詩人，被後世尊稱為詩聖，親歷安史之亂，作品深刻反映社會動盪與百姓苦難，《三吏》《三別》《春望》是唐代社會的真實寫照，其憂國憂民精神影響後世文人至深。"},{"序號":32,"姓名":"白居易","影響力":4,"生卒年":"772-846","朝代":"唐","分類":"文學","貢獻":"《長恨歌》《琵琶行》","簡述":"唐代著名詩人，字樂天，作品語言平易近人，主張詩歌應反映現實民情，倡導新樂府運動，《長恨歌》《琵琶行》膾炙人口，一生關心百姓疾苦，官至刑部尚書，對中唐文學改革貢獻重大。"},{"序號":33,"姓名":"王維","影響力":4,"生卒年":"701-761","朝代":"唐","分類":"文學","貢獻":"《山居秋暝》","簡述":"唐代著名詩人兼畫家，字摩詰，詩中有畫、畫中有詩，山水田園詩意境清幽淡遠，宗教色彩濃厚，因信奉佛法被稱為詩佛，在繪畫上開創水墨山水畫風格，對後世山水詩畫影響深遠。"},{"序號":34,"姓名":"韓愈","影響力":4,"生卒年":"768-824","朝代":"唐","分類":"文學","貢獻":"古文運動","簡述":"唐代著名文學家與思想家，唐宋八大家之首，倡導古文運動，力主恢復先秦兩漢散文傳統，反對浮華駢文，提出文以載道理念，捍衛儒家正統，文章氣勢磅礴，對宋代文學產生深遠影響。"},{"序號":35,"姓名":"柳宗元","影響力":3,"生卒年":"773-819","朝代":"唐","分類":"文學","貢獻":"《永州八記》","簡述":"唐代著名文學家與思想家，與韓愈並稱韓柳，同為唐宋八大家之一，積極參與古文運動，《永州八記》等山水遊記清新雋永，散文成就斐然，政治上屢遭貶謫，以文學寄託心志。"},{"序號":36,"姓名":"玄奘","影響力":4,"生卒年":"602-664","朝代":"唐","分類":"思想","貢獻":"《大唐西域記》","簡述":"唐代著名高僧與佛學翻譯家，貞觀年間隻身西行印度求法，歷時十七年帶回佛典六百餘部，歸國後主持譯經工作，著《大唐西域記》，促進中印文化交流，其精神成為西遊記創作原型。"},{"序號":37,"姓名":"慧能","影響力":4,"生卒年":"638-713","朝代":"唐","分類":"思想","貢獻":"《壇經》","簡述":"唐代禪宗第六代祖師，主張頓悟成佛，不立文字，反對漸修，創立南禪宗，著有《壇經》，將佛法中國化、平民化，使禪宗成為中國佛教最主要宗派，對宋明理學及東亞文化影響深遠。"},{"序號":38,"姓名":"閻立本","影響力":3,"生卒年":"601-673","朝代":"唐","分類":"藝術","貢獻":"《步輦圖》","簡述":"唐代著名宮廷畫家，官至宰相，擅長人物畫與肖像畫，代表作《步輦圖》《歷代帝王圖》栩栩如生，生動描繪宮廷生活與歷代帝王形象，風格嚴謹細膩，是研究唐代繪畫藝術的重要史料。"},{"序號":39,"姓名":"吳道子","影響力":5,"生卒年":"680-759","朝代":"唐","分類":"藝術","貢獻":"道釋人物畫","簡述":"唐代偉大畫家，被後世尊稱為畫聖，善畫佛道人物與山水，線條如吳帶當風般生動飄逸，一生創作壁畫三百餘幅，對中國繪畫線描技法的發展有開創性貢獻，影響後世千年。"},{"序號":40,"姓名":"魏徵","影響力":4,"生卒年":"580-643","朝代":"唐","分類":"綜合","貢獻":"貞觀政治改革","簡述":"唐代著名諫臣與史學家，為唐太宗重用，前後上諫二百餘次，以兼聽則明偏信則暗等名言聞名，是貞觀之治的重要推手，被太宗譽為朕之鏡，一生直言敢諫，成為後世忠臣的千古典範。"},{"序號":41,"姓名":"房玄齡","影響力":4,"生卒年":"579-648","朝代":"唐","分類":"綜合","貢獻":"三省六部制完善","簡述":"唐初重要宰相，輔佐秦王李世民建立功業，玄武門之變謀劃者之一，即位後任中書令，主持制定法令制度，善於選才舉賢，與杜如晦並稱房謀杜斷，是貞觀之治最重要的政治支柱。"},{"序號":42,"姓名":"杜如晦","影響力":4,"生卒年":"585-630","朝代":"唐","分類":"綜合","貢獻":"貞觀決策體系","簡述":"唐初著名謀臣，與房玄齡並稱房謀杜斷，跟隨秦王李世民南征北討，協助策劃玄武門之變，即位後任兵部尚書、右僕射，善於運籌決策，是貞觀初期政治改革的核心人物，英年早逝。"},{"序號":43,"姓名":"狄仁傑","影響力":4,"生卒年":"630-700","朝代":"唐","分類":"綜合","貢獻":"吏治整肅","簡述":"唐代著名政治家與斷案名臣，任大理寺丞期間一年內斷案一萬七千件，秉公執法，被武則天稱為國老，力薦張柬之等賢才輔政，死後不久唐室中興，為一代名相，民間傳說斷案如神。"},{"序號":44,"姓名":"宋太祖","影響力":5,"生卒年":"927-976","朝代":"宋","分類":"政治","貢獻":"杯酒釋兵權","簡述":"宋朝開國皇帝趙匡胤，以陳橋兵變、黃袍加身建立宋朝，終結五代十國混亂局面，以杯酒釋兵權穩定政治，推行重文輕武政策，加強中央集權，奠定宋代文治政策的基本格局。"},{"序號":45,"姓名":"宋仁宗","影響力":4,"生卒年":"1010-1063","朝代":"宋","分類":"政治","貢獻":"慶曆新政","簡述":"宋朝第四位皇帝，在位四十二年為宋朝在位最長的皇帝，性情寬厚仁慈，廣開言路，任用范仲淹、歐陽修等賢臣，推動慶曆新政，朝廷文化繁榮，蘇軾等文學大家皆活躍於此時期。"},{"序號":46,"姓名":"王安石","影響力":5,"生卒年":"1021-1086","朝代":"宋","分類":"政治","貢獻":"新法變法","簡述":"北宋著名政治家與文學家，神宗時期主持推行新法，包括青苗法、免役法、保甲法等，試圖富國強兵，雖受守舊派反對，但其改革精神與政治勇氣影響後世，同時也是唐宋八大家之一。"},{"序號":47,"姓名":"范仲淹","影響力":4,"生卒年":"989-1052","朝代":"宋","分類":"政治","貢獻":"慶曆新政","簡述":"北宋著名政治家、文學家與軍事家，幼年家貧發憤苦讀，主持慶曆新政推行吏治改革，在邊疆抵禦西夏入侵，著《岳陽樓記》留下先天下之憂而憂、後天下之樂而樂的千古名言。"},{"序號":48,"姓名":"岳飛","影響力":5,"生卒年":"1103-1142","朝代":"宋","分類":"軍事","貢獻":"郾城大捷","簡述":"南宋著名抗金將領，民族英雄，創立精銳的岳家軍，連克金軍，郾城大捷重創金兵主力，眼看即將收復中原，卻被奸相秦檜以莫須有罪名冤殺，精忠報國精神成為後世愛國主義的象徵。"},{"序號":49,"姓名":"韓世忠","影響力":4,"生卒年":"1089-1151","朝代":"宋","分類":"軍事","貢獻":"黃天蕩之戰","簡述":"南宋著名抗金將領，驍勇善戰，黃天蕩之戰以八千兵力困住金兀朮十萬大軍四十八日，戰功卓著，後與岳飛共同抵禦金軍入侵，岳飛冤殺後憤而隱退，以清廉自守彪炳史冊。"},{"序號":50,"姓名":"蘇軾","影響力":5,"生卒年":"1037-1101","朝代":"宋","分類":"文學","貢獻":"《赤壁賦》《念奴嬌·赤壁懷古》","簡述":"北宋著名文學家、書畫家與政治家，字子瞻號東坡，詩詞文書畫無一不精，詞風豪放開創新一代詞風，《赤壁賦》《念奴嬌》膾炙人口，雖仕途多舛屢遭貶謫，仍樂觀曠達，影響後世深遠。"},{"序號":51,"姓名":"蘇轍","影響力":3,"生卒年":"1039-1112","朝代":"宋","分類":"文學","貢獻":"政論散文","簡述":"北宋文學家與政治家，蘇軾之弟，唐宋八大家之一，文章政論嚴謹沉穩，其散文思想深刻、以議論見長，曾任尚書右丞，與父蘇洵、兄蘇軾並稱三蘇，是北宋文壇最有影響力的文學家族。"},{"序號":52,"姓名":"蘇洵","影響力":3,"生卒年":"1009-1066","朝代":"宋","分類":"文學","貢獻":"《六國論》","簡述":"北宋著名散文家，蘇軾蘇轍之父，唐宋八大家之一，二十七歲才發憤讀書，以論文著稱，《六國論》等文章分析精闢，邏輯嚴密，善於從歷史中汲取政治教訓，與兩子並稱三蘇。"},{"序號":53,"姓名":"歐陽修","影響力":5,"生卒年":"1007-1072","朝代":"宋","分類":"文學","貢獻":"古文運動","簡述":"北宋著名文學家、史學家與政治家，唐宋八大家之一，主導北宋文學革新，提倡平易自然的古文風格，積極培養蘇軾等後輩文人，主修《新唐書》《新五代史》，在文學改革上承前啟後。"},{"序號":54,"姓名":"辛棄疾","影響力":5,"生卒年":"1140-1207","朝代":"宋","分類":"文學","貢獻":"《破陣子》","簡述":"南宋著名詞人與愛國將領，字幼安號稼軒，詞風豪放悲壯，作品多抒發恢復中原的愛國壯志與壯志難酬的悲憤，《破陣子》《永遇樂》傳誦千古，與蘇軾並稱蘇辛，為豪放派代表。"},{"序號":55,"姓名":"李清照","影響力":5,"生卒年":"1084-1155","朝代":"宋","分類":"文學","貢獻":"《聲聲慢》","簡述":"宋代著名女詞人，號易安居士，婉約詞派代表，前期作品清麗明快，後期因戰亂流離丈夫亡故，詞風轉為悽婉深沉，《聲聲慢》《如夢令》情感真摯細膩，被後世譽為千古第一才女。"},{"序號":56,"姓名":"朱熹","影響力":5,"生卒年":"1130-1200","朝代":"宋","分類":"思想","貢獻":"《四書集注》","簡述":"南宋著名哲學家與教育家，理學集大成者，主張格物致知與存天理滅人欲，編撰《四書集注》成為科舉必讀教材，其思想主導中國學術與教育長達七百年，對東亞文化影響極為深遠。"},{"序號":57,"姓名":"陸九淵","影響力":4,"生卒年":"1139-1193","朝代":"宋","分類":"思想","貢獻":"心學體系","簡述":"南宋著名哲學家，心學先驅，主張心即理，強調向內自省與直覺體悟，反對程朱的繁瑣訓詁，與朱熹展開著名的鵝湖之辯，其思想為後來王陽明心學的發展奠定重要的理論基礎。"},{"序號":58,"姓名":"王陽明","影響力":5,"生卒年":"1472-1529","朝代":"明","分類":"思想","貢獻":"知行合一","簡述":"明代著名哲學家、軍事家與政治家，名守仁字伯安，心學集大成者，提出知行合一與致良知學說，平定寧王之亂，其心學思想打破程朱理學的壟斷，深刻影響後世東亞思想文化。"},{"序號":59,"姓名":"沈括","影響力":5,"生卒年":"1040-1096","朝代":"宋","分類":"科學","貢獻":"《夢溪筆談》","簡述":"北宋著名科學家與政治家，著有《夢溪筆談》，以系統性筆記形式記錄中國古代科技成就，涵蓋天文地質、物理生物與工程技術，其對指南針與活字印刷的記述是最早的科學文獻之一。"},{"序號":60,"姓名":"畢昇","影響力":5,"生卒年":"1041-1095","朝代":"宋","分類":"科學","貢獻":"活字印刷術","簡述":"北宋工匠，發明活字印刷術，以膠泥刻字燒製成型，大幅提升印刷效率與靈活性，比德國古騰堡活字印刷早約四百年，是人類印刷技術史上的重大突破，對文化傳播與知識普及貢獻巨大。"},{"序號":61,"姓名":"蘇頌","影響力":4,"生卒年":"1020-1101","朝代":"宋","分類":"科學","貢獻":"水運儀象台","簡述":"北宋著名天文學家與機械工程師，主持製造水運儀象台，結合天文觀測與報時功能，是世界上最早的天文鐘雛形，同時主編《本草圖經》，在科技史上有多項開創性成就，學識淵博。"},{"序號":62,"姓名":"郭守敬","影響力":5,"生卒年":"1231-1316","朝代":"元","分類":"科學","貢獻":"授時曆","簡述":"元代著名天文學家與水利工程師，主持製造多種天文儀器，精確觀測製成《授時曆》，精確度極高沿用達三百六十年，同時主持大規模水利工程建設，是中國古代科學成就的傑出代表。"},{"序號":63,"姓名":"包拯","影響力":4,"生卒年":"999-1062","朝代":"宋","分類":"綜合","貢獻":"司法改革","簡述":"北宋著名清官，字希仁，民間尊稱包青天，任開封府尹時斷案公正無私，嚴懲貪腐，不畏權貴，執法如山，深受百姓愛戴，其廉潔正直形象成為中國歷代司法公正的象徵與精神典範。"},{"序號":64,"姓名":"司馬光","影響力":5,"生卒年":"1019-1086","朝代":"宋","分類":"綜合","貢獻":"《資治通鑑》","簡述":"北宋著名史學家與政治家，主持編撰《資治通鑑》，歷時十九年，涵蓋戰國至五代共一千三百六十二年歷史，為編年體史書最高成就，在政治上代表守舊派，與王安石新法相抗衡。"},{"序號":65,"姓名":"忽必烈","影響力":5,"生卒年":"1215-1294","朝代":"元","分類":"政治","貢獻":"建立元朝","簡述":"元朝第五位大汗與開國皇帝，成吉思汗之孫，南征北討完成全國統一，建立橫跨歐亞的大元帝國，推行漢法、設立行省制度、推動海上絲綢之路，促進中外文化與貿易的廣泛交流。"},{"序號":66,"姓名":"關漢卿","影響力":5,"生卒年":"1210-1280","朝代":"元","分類":"文學","貢獻":"《竇娥冤》","簡述":"元代著名戲曲作家，元曲四大家之首，被譽為元曲之祖，一生創作雜劇六十餘種，代表作《竇娥冤》深刻揭露社會黑暗與司法腐敗，塑造了中國文學史上最具震撼力的悲劇人物形象。"},{"序號":67,"姓名":"趙孟頫","影響力":5,"生卒年":"1254-1322","朝代":"元","分類":"藝術","貢獻":"復古書風","簡述":"元代著名書法家與畫家，宋室後裔入仕元朝，書法諸體皆精，趙體楷書秀麗圓潤影響後世書風數百年，繪畫倡導復古強調書畫同源，是元代藝術史上最具影響力的藝術大師。"},{"序號":68,"姓名":"朱元璋","影響力":5,"生卒年":"1328-1398","朝代":"明","分類":"政治","貢獻":"建立明朝","簡述":"明朝開國皇帝，出身貧苦，以乞丐起家投身義軍，憑藉卓越才智推翻元朝統治，建立明朝，廢除丞相制度加強皇權，推行裡甲制度整頓社會，史稱洪武之治，奠定明代兩百餘年基業。"},{"序號":69,"姓名":"朱棣","影響力":5,"生卒年":"1360-1424","朝代":"明","分類":"政治","貢獻":"《永樂大典》","簡述":"明朝第三位皇帝，明太祖第四子，以藩王身份發動靖難之役奪取帝位，遷都北京確立政治中心，命鄭和七下西洋擴大國際影響，組織編修《永樂大典》保存文化遺產，是明代最有作為的皇帝之一。"},{"序號":70,"姓名":"張居正","影響力":5,"生卒年":"1525-1582","朝代":"明","分類":"政治","貢獻":"一條鞭法","簡述":"明代著名政治家與改革家，萬曆年間主政十年，推行一條鞭法整合稅制、清丈田畝、考成法考核官吏，使財政大幅好轉、國力重振，史稱萬曆中興，是中國歷史上最成功的改革家之一。"},{"序號":71,"姓名":"戚繼光","影響力":5,"生卒年":"1528-1588","朝代":"明","分類":"軍事","貢獻":"戚家軍","簡述":"明代著名軍事家，南倭北虜的雙重功臣，南方編練戚家軍、創製鴛鴦陣，有效剿滅東南沿海倭患，後轉戍北方邊疆主持修築長城，著《紀效新書》《練兵實紀》，為後世軍事訓練理論奠基。"},{"序號":72,"姓名":"袁崇煥","影響力":4,"生卒年":"1584-1630","朝代":"明","分類":"軍事","貢獻":"寧遠大捷","簡述":"明末著名將領，任薊遼督師，以寧遠大捷擊退努爾哈赤，是晚明抵禦後金最有力的屏障，後遭崇禎皇帝中反間計，以謀反之名被凌遲處死，冤案震驚天下，清修明史後才得以昭雪。"},{"序號":73,"姓名":"施耐庵","影響力":5,"生卒年":"1296-1370","朝代":"明","分類":"文學","貢獻":"《水滸傳》","簡述":"元末明初著名小說家，以白話文創作長篇小說《水滸傳》，描寫宋代一百零八位梁山好漢的聚義故事，深刻揭示官逼民反的社會現實，語言生動人物鮮明，為中國古典小說四大名著之一。"},{"序號":74,"姓名":"羅貫中","影響力":5,"生卒年":"約1330-1400","朝代":"明","分類":"文學","貢獻":"《三國演義》","簡述":"元末明初著名小說家，依據三國史實與民間傳說創作《三國演義》，以七分史實三分虛構的手法呈現漢末三國英雄豪傑的壯闊歷史，是中國文學史上第一部成熟的章回體歷史小說。"},{"序號":75,"姓名":"湯顯祖","影響力":5,"生卒年":"1550-1616","朝代":"明","分類":"文學","貢獻":"《牡丹亭》","簡述":"明代著名戲曲家與文學家，臨川四夢代表作《牡丹亭》描寫杜麗娘為情而死復生的浪漫故事，情感細膩豐富，語言優美典麗，被視為中國戲曲史上最偉大的作品之一，影響後世深遠。"},{"序號":76,"姓名":"宋應星","影響力":5,"生卒年":"1587-1666","朝代":"明","分類":"科學","貢獻":"《天工開物》","簡述":"明代著名科學家，所著《天工開物》系統記錄中國農業與手工業的技術知識，涵蓋農業、紡織、陶瓷、冶金等十八個領域，圖文並茂，是東方技術文明的百科全書，為世界科技史的重要文獻。"},{"序號":77,"姓名":"徐光啟","影響力":5,"生卒年":"1562-1633","朝代":"明","分類":"科學","貢獻":"《幾何原本》","簡述":"明代著名科學家與翻譯家，與傳教士利瑪竇合作翻譯《幾何原本》，引進西方數學與科學知識，編撰《農政全書》整合農業知識，是晚明中西文化交流與科技融合的先驅人物。"},{"序號":78,"姓名":"李時珍","影響力":5,"生卒年":"1518-1593","朝代":"明","分類":"醫學","貢獻":"《本草綱目》","簡述":"明代著名醫藥學家，歷時二十七年著成《本草綱目》，收錄藥物一千八百九十二種，附方一萬一千餘條，糾正前人錯誤並以科學方法分類，是中國醫藥史上最重要的著作，被譽為東方藥學聖典。"},{"序號":79,"姓名":"徐霞客","影響力":5,"生卒年":"1587-1641","朝代":"明","分類":"科學","貢獻":"《徐霞客遊記》","簡述":"明代著名地理學家與旅行家，三十年遊歷中國各地考察山川地貌，著《徐霞客遊記》，系統描述岩溶地貌，是世界上最早的岩溶地貌學著作，開創科學地理考察先河，文筆亦如散文名著。"},{"序號":80,"姓名":"文徵明","影響力":4,"生卒年":"1470-1559","朝代":"明","分類":"藝術","貢獻":"吳門畫派","簡述":"明代著名書畫家，吳門四家之一，詩書畫三絕，以細膩工整的工筆畫和清秀流麗的書法著稱，九十歲高齡仍筆耕不輟，主導蘇州文人畫壇半世紀，影響明中期以後吳派繪畫風格的形成。"},{"序號":81,"姓名":"唐寅","影響力":4,"生卒年":"1470-1524","朝代":"明","分類":"藝術","貢獻":"人物山水畫","簡述":"明代著名書畫家與詩人，字伯虎，吳中四才子之一，才學出眾卻科場受挫，以詩畫自娛，繪畫題材廣泛，人物山水均有佳作，詩文風流倜儻，才情橫溢的一生成為後世傳奇故事的素材。"},{"序號":82,"姓名":"仇英","影響力":4,"生卒年":"1498-1552","朝代":"明","分類":"藝術","貢獻":"工筆重彩畫","簡述":"明代著名畫家，吳門四家之一，工筆重彩畫技藝精湛，尤擅人物、界畫與青綠山水，所作仕女圖形象典雅秀美，《漢宮春曉圖》等長卷精緻細膩，是明代院體畫風格的最高代表之一。"},{"序號":83,"姓名":"海瑞","影響力":4,"生卒年":"1514-1587","朝代":"明","分類":"綜合","貢獻":"嚴懲貪腐","簡述":"明代著名清官，字汝賢，歷任地方官至都察院右都御史，為官剛正廉潔，力懲貪腐，替民做主，甚至上疏直斥嘉靖皇帝之過，遭囚禁後被百姓自發迎回，被後世尊為中國清官廉吏的典範。"},{"序號":84,"姓名":"黃宗羲","影響力":5,"生卒年":"1610-1695","朝代":"清","分類":"思想","貢獻":"《明夷待訪錄》","簡述":"明末清初著名思想家與史學家，反對君主專制，著《明夷待訪錄》提出限制君權、保障民權的先進理念，被後世譽為中國啟蒙思想第一人，也是浙東學派的奠基人，著述宏富影響深遠。"},{"序號":85,"姓名":"顧炎武","影響力":5,"生卒年":"1613-1682","朝代":"清","分類":"思想","貢獻":"經世致用學","簡述":"明末清初著名思想家與經學家，字亭林，主張經世致用，重視實際問題研究，著《日知錄》《天下郡國利病書》等，對語言學與歷史地理有重大貢獻，開創清代樸學考據學先河。"},{"序號":86,"姓名":"王夫之","影響力":4,"生卒年":"1627-1704","朝代":"清","分類":"思想","貢獻":"《讀通鑑論》","簡述":"明末清初著名思想家，字而農號船山，一生拒絕仕清隱居著述，著《讀通鑑論》《船山遺書》等，以氣一元論批判理學，強調物質現實性，主張民族意識，是中國古代哲學的重要總結者。"},{"序號":87,"姓名":"龔自珍","影響力":4,"生卒年":"1792-1841","朝代":"清","分類":"思想","貢獻":"《己亥雜詩》","簡述":"清代著名思想家與文學家，字璱人號定庵，倡導改革批判清朝政治腐敗，《己亥雜詩》三百一十五首反映晚清社會矛盾，我勸天公重抖擻不拘一格降人材廣為傳誦，是晚清改革的先聲。"},{"序號":88,"姓名":"魏源","影響力":5,"生卒年":"1794-1857","朝代":"清","分類":"思想","貢獻":"《海國圖志》","簡述":"清代著名思想家與史學家，字默深，鴉片戰爭後著《海國圖志》，系統介紹世界各國地理歷史與政治，提出師夷長技以制夷主張，開啟中國向西方學習的思想先河，對洋務運動影響深遠。"},{"序號":89,"姓名":"康熙帝","影響力":5,"生卒年":"1654-1722","朝代":"清","分類":"政治","貢獻":"平定三藩","簡述":"清朝第四位皇帝，八歲即位，親政後平定三藩之亂、統一台灣、抵禦沙俄入侵，簽訂《尼布楚條約》，在位六十一年為中國歷史上在位最長的皇帝，文治武功俱備，開創康雍乾盛世基礎。"},{"序號":90,"姓名":"雍正帝","影響力":4,"生卒年":"1678-1735","朝代":"清","分類":"政治","貢獻":"攤丁入畝","簡述":"清朝第五位皇帝，以勤政著稱，在位十三年大力整頓吏治，推行攤丁入畝將人頭稅併入土地稅，改革財政制度，設立軍機處加強皇權，為乾隆盛世奠定財政基礎，是清代最勤政的皇帝。"},{"序號":91,"姓名":"乾隆帝","影響力":4,"生卒年":"1711-1799","朝代":"清","分類":"政治","貢獻":"《四庫全書》","簡述":"清朝第六位皇帝，在位六十年加太上皇四年實際執政達六十三年，鼎盛時期疆域遼闊，主持編修《四庫全書》集歷代典籍之大成，喜詩文書畫，然晚年好大喜功，政治腐敗問題漸趨嚴重。"},{"序號":92,"姓名":"李鴻章","影響力":5,"生卒年":"1823-1901","朝代":"清","分類":"政治","貢獻":"洋務運動","簡述":"清末著名政治家與外交家，淮軍統帥，主導洋務運動，創辦江南製造局等近代工業，組建北洋艦隊，代表清廷簽訂多項不平等條約，被稱為東方俾斯麥，歷史評價毀譽參半影響深遠。"},{"序號":93,"姓名":"曾國藩","影響力":5,"生卒年":"1811-1872","朝代":"清","分類":"政治","貢獻":"湘軍","簡述":"清末著名政治家、軍事家與文學家，率湘軍平定太平天國之亂，是清朝中興的關鍵人物，倡導洋務運動，重視人才培育，治軍嚴明，其家書與修身思想至今仍是後世學習的重要典範。"},{"序號":94,"姓名":"多爾袞","影響力":5,"生卒年":"1612-1650","朝代":"清","分類":"軍事","貢獻":"清軍入關","簡述":"清初著名政治家與軍事統帥，努爾哈赤之子，統率清軍入主中原，輔佐順治帝確立清朝對全國的統治，任攝政王期間制定多項開國政策，是清朝入關建政的最重要功臣，死後被追尊為成宗。"},{"序號":95,"姓名":"年羹堯","影響力":3,"生卒年":"1679-1726","朝代":"清","分類":"軍事","貢獻":"平定青海","簡述":"清代將領，雍正時期重臣，平定青海羅卜藏丹津叛亂，建立卓著功勳，曾獲雍正帝極度寵信，官至撫遠大將軍，後因居功自傲、結黨營私，被雍正帝以九十二條大罪賜死，為清代政治典型案例。"},{"序號":96,"姓名":"左宗棠","影響力":5,"生卒年":"1812-1885","朝代":"清","分類":"軍事","貢獻":"收復新疆","簡述":"清末著名政治家與軍事家，湘軍重要將領，鎮壓太平天國後任閩浙總督，後以年近七旬之齡率軍西征，收復被阿古柏侵佔的新疆，捍衛中國西北領土，是維護國家主權的民族英雄。"},{"序號":97,"姓名":"八大山人","影響力":5,"生卒年":"1626-1705","朝代":"清","分類":"藝術","貢獻":"寫意花鳥畫","簡述":"清初著名書畫家，明宗室後裔朱耷，明亡後出家為僧，以書畫寄托故國之思，花鳥魚石寥寥數筆意境深遠，白眼朝天的魚鳥造型傳遞亡國之痛，對後世寫意花鳥畫發展影響至為深遠。"},{"序號":98,"姓名":"鄭板橋","影響力":4,"生卒年":"1693-1765","朝代":"清","分類":"藝術","貢獻":"墨竹畫","簡述":"清代著名書畫家與詩人，名燮，揚州八怪之一，以畫蘭竹石著稱，書法創六分半書融篆隸行楷於一體，詩文真率自然，任縣令時關懷民瘼，一身傲骨清正，難得糊塗名言廣為傳誦。"},{"序號":99,"姓名":"葉天士","影響力":5,"生卒年":"1667-1747","朝代":"清","分類":"醫學","貢獻":"溫病學說","簡述":"清代著名醫學家，名桂字香岩，精通各科尤以溫病見長，創立衛氣營血辨證理論，奠定溫病學說的理論基礎，擅長辨症論治，著《臨證指南醫案》，是清代最具影響力的臨床醫學大師。"},{"序號":100,"姓名":"吳謙","影響力":4,"生卒年":"1689-1748","朝代":"清","分類":"醫學","貢獻":"《醫宗金鑑》","簡述":"清代著名醫學家，供職太醫院，奉乾隆帝命主持編撰《醫宗金鑑》九十卷，系統整理中醫理論診斷、方劑與各科臨床，是清代規模最大的醫學叢書，長期作為太醫院教學的標準教材。"},{"序號":101,"姓名":"薛己","影響力":3,"生卒年":"1487-1559","朝代":"明","分類":"醫學","貢獻":"內婦科醫學","簡述":"明代著名醫學家，字新甫，太醫院院使，以內科與婦科最為精擅，主張溫補脾胃，重視脾腎根本，著有《內科摘要》《女科撮要》等多種醫書，是明代醫學溫補學派的代表人物，影響深遠。"},{"序號":102,"姓名":"紀昀","影響力":5,"生卒年":"1724-1805","朝代":"清","分類":"綜合","貢獻":"《四庫全書》","簡述":"清代著名文學家與學者，字曉嵐，主持編纂《四庫全書》，歷時十年收書三千四百七十種，是中國歷史上規模最大的叢書，同時著《閱微草堂筆記》文筆雋永，被稱為一代宗師與文化巨匠。"},{"序號":103,"姓名":"林則徐","影響力":5,"生卒年":"1785-1850","朝代":"清","分類":"綜合","貢獻":"虎門銷煙","簡述":"清代著名政治家與民族英雄，道光年間任欽差大臣赴廣州查禁鴉片，主持虎門銷煙二萬餘箱震驚世界，後遭革職充軍新疆矢志不移，著《四洲志》介紹世界地理，是近代開眼看世界的先驅。"},{"序號":104,"姓名":"和珅","影響力":2,"生卒年":"1750-1799","朝代":"清","分類":"綜合","貢獻":"權相制度","簡述":"清代乾隆時期著名寵臣，以善迎帝意深獲寵信，官至首席大學士，二十年間貪腐無度，嘉慶帝即位後即遭抄家，查獲財富據估計相當於清廷十五年財政收入，成為古今貪腐的代名詞。"},{"序號":105,"姓名":"扁鵲","影響力":5,"生卒年":"前407-前310","朝代":"先秦","分類":"醫學","貢獻":"望聞問切","簡述":"戰國時期著名醫學家，原名秦越人，是中國古代最著名的醫者，開創望聞問切四診法，診斷精確能起死回生，為後世中醫診斷學奠定基礎，周遊列國行醫，被後世尊稱為醫祖與醫聖。"},{"序號":106,"姓名":"墨子","影響力":4,"生卒年":"前770-前221","朝代":"先秦","分類":"科學","貢獻":"墨家科學思想","簡述":"先秦著名思想家與工程師，墨家學派創始人，不僅提出兼愛非攻的倫理主張，更在物理學、光學、數學與工程力學方面有重要貢獻，小孔成像等光學原理比西方早兩千年，是中國最早的科學家。"},{"序號":107,"姓名":"沈括","影響力":5,"生卒年":"1040-1100","朝代":"宋","分類":"科學","貢獻":"《夢溪筆談》","簡述":"北宋著名科學家與政治家，著有《夢溪筆談》，以筆記形式系統記錄中國古代科技成就，涵蓋天文地質、物理生物與工程技術，對指南針與活字印刷的記述是最早的科學文獻，被譽為科學史名著。"},{"序號":108,"姓名":"岳飛","影響力":5,"生卒年":"1103-1142","朝代":"宋","分類":"軍事","貢獻":"岳家軍","簡述":"南宋著名抗金將領，字鵬舉，統率岳家軍屢敗金軍，軍紀嚴明所向披靡，是南宋最重要的軍事將領，因主戰派與主和派衝突，被秦檜以莫須有罪名冤殺，精忠報國成為民族精神的象徵。"},{"序號":109,"姓名":"王實甫","影響力":4,"生卒年":"約1260-1336","朝代":"元","分類":"文學","貢獻":"《西廂記》","簡述":"元代著名戲曲作家，元曲四大家之一，代表作《西廂記》描寫張君瑞與崔鶯鶯的愛情故事，突破封建禮教束縛，追求自由戀愛與婚姻自主，語言優美生動，是中國古典戲曲的最高藝術成就之一。"},{"序號":110,"姓名":"馬致遠","影響力":4,"生卒年":"約1251-1321","朝代":"元","分類":"文學","貢獻":"《天淨沙·秋思》","簡述":"元代著名散曲家與戲曲作家，元曲四大家之一，散曲成就尤高，代表作《天淨沙·秋思》以二十八字描繪天涯旅人的愁思，被譽為秋思之祖，戲曲《漢宮秋》描繪王昭君悲劇亦廣為傳頌。"},{"序號":111,"姓名":"黃公望","影響力":5,"生卒年":"1269-1354","朝代":"元","分類":"藝術","貢獻":"《富春山居圖》","簡述":"元代著名山水畫家，字子久號大癡，元四家之首，代表作《富春山居圖》以渴筆焦墨描繪富春江景色，構圖疏密有致，氣韻悠遠，為中國山水畫的巔峰之作，對後世山水畫派影響極為深遠。"},{"序號":112,"姓名":"仇英","影響力":4,"生卒年":"約1494-1552","朝代":"明","分類":"藝術","貢獻":"工筆人物畫","簡述":"明代著名工筆畫家，字實父，吳門四家之一，精於工筆人物畫，所繪仕女形象秀麗典雅，《漢宮春曉圖》精妙傳神，在明代院體與文人畫之間架起橋梁，留下眾多傳世佳作，影響後世深遠。"},{"序號":113,"姓名":"高濂","影響力":3,"生卒年":"約1527-1603","朝代":"明","分類":"文學","貢獻":"戲曲理論","簡述":"明代著名文學家與戲曲理論家，字深甫，著有傳奇《玉簪記》，是明代重要戲曲作品，另著《燕閑清賞箋》論述文人生活藝術，對明代戲曲理論與文人美學有一定影響，是明後期文化人代表。"},{"序號":114,"姓名":"湯顯祖","影響力":5,"生卒年":"1550-1616","朝代":"明","分類":"文學","貢獻":"《牡丹亭》","簡述":"明代傑出戲曲作家，字義仍號若士，臨川四夢奠定其戲曲史地位，《牡丹亭》以情之至為核心，描述杜麗娘夢中情緣死而復生的愛情故事，突破禮教藩籬，被譽為東方的莎士比亞。"},{"序號":115,"姓名":"李自成","影響力":4,"生卒年":"1606-1645","朝代":"明","分類":"軍事","貢獻":"大順政權","簡述":"明末農民起義領袖，陝西米脂人，崇禎年間率大順軍縱橫中原，提出均田免糧口號廣受農民支持，1644年攻入北京推翻明朝，惜因驕縱腐化，很快敗於清軍與吳三桂聯軍，壯志未竟。"},{"序號":116,"姓名":"尚可喜","影響力":3,"生卒年":"1604-1676","朝代":"清","分類":"軍事","貢獻":"平定南明","簡述":"清初藩王，遼東人，初仕明朝後降清，封平南王鎮守廣東，平定南明勢力有功，晚年因清廷裁撤藩鎮之議，其子尚之信發動三藩之亂，尚可喜本人主動請求撤藩，立場在三藩中最為複雜。"},{"序號":117,"姓名":"耿繼茂","影響力":3,"生卒年":"？-1671","朝代":"清","分類":"軍事","貢獻":"地方鎮壓","簡述":"清初藩王，耿仲明之子，繼承靖南王爵位鎮守福建，在位期間對地方有較大控制權，協助清廷平定南明殘餘勢力，其子耿精忠後參與三藩之亂，代表清初藩王制度在南方鞏固統治的典型人物。"},{"序號":118,"姓名":"鄭燮","影響力":4,"生卒年":"1693-1765","朝代":"清","分類":"藝術","貢獻":"墨竹書法","簡述":"清代著名書畫家與詩人，字克柔號板橋，揚州八怪代表人物，以蘭竹題材的水墨畫享譽畫壇，書法自創六分半書，詩詞直白深切，任縣令時廉政愛民，一生個性鮮明傲骨錚錚，留下眾多佳話。"},{"序號":119,"姓名":"金農","影響力":4,"生卒年":"1687-1763","朝代":"清","分類":"藝術","貢獻":"隸書","簡述":"清代著名書畫家，字壽門號冬心，揚州八怪之首，以隸書創漆書體獨樹一幟，繪畫以梅花荷花人物見長，風格古拙蒼勁，詩文學問淵博，是揚州八怪中最具學者氣質的藝術家之一。"},{"序號":120,"姓名":"張仲景","影響力":5,"生卒年":"約150-219","朝代":"漢","分類":"醫學","貢獻":"《傷寒雜病論》","簡述":"東漢末年著名醫學家，名機字仲景，親歷疫 const DYNASTY_ORDER = ["先秦","戰國","秦漢","三國","隋","唐","宋","元","明","清"];
const dynastyIdx = d => { const i = DYNASTY_ORDER.indexOf(d); return i >= 0 ? i : 99; };

const STARS = n => "★".repeat(n) + "☆".repeat(5-n);

let filterDynasty = "全部";
let filterCat = "全部";

// Build dynasty & category sets
const dynasties = ["全部", ...DYNASTY_ORDER.filter(d => RAW.some(p => p["朝代"] === d))];
const cats = ["全部", ...["思想","政治","軍事","文學","藝術","科學","醫學","綜合"].filter(c => RAW.some(p => p["分類"] === c))];
console.log("原始資料數量:", RAW.length);
console.log("過濾後的朝代:", dynasties);
console.log("過濾後的分類:", cats);
function buildBtns(containerId, items, getter, setter) {
  const el = document.getElementById(containerId);
  items.forEach(item => {
    const b = document.createElement("button");
    b.className = "btn" + (item === "全部" ? " btn-all" : "");
    b.textContent = item;
    b.dataset.val = item;
    b.onclick = () => { setter(item); render(); };
    el.appendChild(b);
  });
}

buildBtns("dynasty-btns", dynasties, () => filterDynasty, v => filterDynasty = v);
buildBtns("cat-btns", cats, () => filterCat, v => filterCat = v);

function updateBtns(containerId, active) {
  document.querySelectorAll(`#${containerId} .btn`).forEach(b => {
    b.classList.toggle("active", b.dataset.val === active);
  });
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const sort = document.getElementById("sort").value;

  updateBtns("dynasty-btns", filterDynasty);
  updateBtns("cat-btns", filterCat);

  let filtered = RAW.filter(p => {
    if (filterDynasty !== "全部" && p["朝代"] !== filterDynasty) return false;
    if (filterCat !== "全部" && p["分類"] !== filterCat) return false;
    if (q) {
      const haystack = (p["姓名"] + p["簡述"]).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  if (sort === "influence") {
    filtered.sort((a, b) => b["影響力"] - a["影響力"] || dynastyIdx(a["朝代"]) - dynastyIdx(b["朝代"]));
  } else {
    filtered.sort((a, b) => dynastyIdx(a["朝代"]) - dynastyIdx(b["朝代"]) || a["序號"] - b["序號"]);
  }

  const grid = document.getElementById("grid");
  document.getElementById("result-bar").textContent = `共 ${filtered.length} 位人物`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-result">沒有符合條件的人物</div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const desc = p["簡述"];
    const dynasty = p["朝代"];
    const cat = p["分類"];
    const tagClass = "tag tag-" + dynasty;
    return `
    <div class="card" onclick="toggleCard(this)">
      <div class="card-top">
        <span class="${tagClass}">${dynasty}</span>
        <span class="tag tag-cat">${cat}</span>
        <span class="year">${p["生卒年"]}</span>
      </div>
      <div class="stars">${STARS(p["影響力"])}</div>
      <div class="card-name">${p["姓名"]}</div>
      <div class="card-atrib">${p["貢獻"]}</div>
      <div class="card-desc collapsed">${desc}</div>
    </div>`;
  }).join("");
}

function toggleCard(card) {
  const desc = card.querySelector(".card-desc");
  const btn = card.querySelector(".expand-btn");
  const isCollapsed = desc.classList.contains("collapsed");
  desc.classList.toggle("collapsed", !isCollapsed);
}

// Init
render();

let quizPool = [], quizIdx = 0, quizScore = 0;
const QUIZ_TOTAL = 10;

function startQuiz() {
  const shuffled = [...RAW].sort(() => Math.random() - 0.5);
  quizPool = shuffled.slice(0, QUIZ_TOTAL);
  quizIdx = 0;
  quizScore = 0;
  document.getElementById('quiz-result').classList.remove('show');
  document.getElementById('quiz-main').style.display = '';
  document.getElementById('quiz-overlay').classList.add('active');
  loadQuestion();
}

function loadQuestion() {
  const p = quizPool[quizIdx];
  document.getElementById('q-progress').textContent = '第 ' + (quizIdx+1) + ' / ' + QUIZ_TOTAL + ' 題';
  document.getElementById('q-score').textContent = '答對 ' + quizScore + ' 題';
  document.getElementById('q-question').textContent = p['貢獻'];
  document.getElementById('q-explain').className = 'quiz-explain';
  document.getElementById('q-next').className = 'quiz-next-btn';

  const correctName = p['姓名'];
  const wrongs = [];
  const pool = RAW.filter(x => x['序號'] !== p['序號']);
  const shuffledPool = [...pool].sort(() => Math.random() - 0.5);
  for (const x of shuffledPool) {
    if (wrongs.length >= 3) break;
    if (x['姓名'] !== correctName && !wrongs.find(w => w['姓名'] === x['姓名'])) {
      wrongs.push(x);
    }
  }
  const options = [
    { name: correctName, correct: true },
    ...wrongs.map(x => ({ name: x['姓名'], correct: false }))
  ].sort(() => Math.random() - 0.5);

  const container = document.getElementById('q-options');
  container.innerHTML = '';
  options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = o.name;
    btn.addEventListener('click', () => selectAnswer(btn, o.correct, correctName));
    container.appendChild(btn);
  });
}

function selectAnswer(btn, isCorrect, correctName) {
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === correctName) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');
  if (isCorrect) quizScore++;

  const p = quizPool[quizIdx];
  const ex = document.getElementById('q-explain');
  ex.textContent = p['朝代'] + '・' + p['分類'] + '｜' + p['簡述'];
  ex.className = 'quiz-explain show';

  const nextBtn = document.getElementById('q-next');
  nextBtn.textContent = (quizIdx + 1 < QUIZ_TOTAL) ? '下一題 →' : '查看結果';
  nextBtn.className = 'quiz-next-btn show';
}

function nextQuestion() {
  quizIdx++;
  if (quizIdx < QUIZ_TOTAL) {
    loadQuestion();
  } else {
    endQuiz();
  }
}

function endQuiz() {
  document.getElementById('quiz-main').style.display = 'none';
  document.getElementById('r-score').textContent = quizScore + ' / ' + QUIZ_TOTAL;
  const grades = [
    [10, '為師沒什麼能教你了 🏆'],
    [8,  '你知道太多了 🥇'],
    [6,  '略勝路人一點 📚'],
    [4,  '進步空間很大 📖'],
    [0,  '我是誰❓我在哪❓']
  ];
  const grade = grades.find(g => quizScore >= g[0]);
  document.getElementById('r-grade').textContent = grade[1];
  document.getElementById('quiz-result').classList.add('show');
  document.getElementById('q-score').textContent = '答對 ' + quizScore + ' 題';
}

function closeQuiz() {
  document.getElementById('quiz-overlay').classList.remove('active');
}
</script>

</html>
